<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | Health Assist</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="dashboard">

<script>
if (!localStorage.getItem("token")) {
  window.location.replace("login.html");
}

/* ========= BACK BUTTON INTERCEPT ========= */
window.history.pushState(null, "", window.location.href);

window.addEventListener("popstate", function () {
  document.getElementById("logoutModal").style.display = "flex";
});
</script>

    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Health Assist</h3>
      <button onclick="showNormal()">Normal Mode</button>
      <button onclick="goEmergency()" class="danger">Emergency Mode</button>
      <button onclick="newChat()" class="new-chat-btn">
        + New Chat
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Top Bar -->
      <div class="top-bar">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <!-- Normal Mode -->
      <section id="normalMode" class="chat-layout">

        <div class="chat-body" id="chatBox"></div>

        <div class="chat-input-area">
          <textarea
            id="symptoms"
            placeholder="Type your symptoms here..."
            rows="1"
          ></textarea>

          <button class="send-btn" onclick="sendSymptoms()">Send</button>
        </div>

      </section>

    </main>

  </div>

  <script src="js/normalMode.js"></script>

  <script>
    function goEmergency() {
      window.location.replace("emergency.html");
    }

    function logout() {
      document.getElementById("logoutModal").style.display = "flex";
    }

    function closeLogoutModal() {
      document.getElementById("logoutModal").style.display = "none";
      window.history.pushState(null, "", window.location.href);
    }

    function confirmLogout() {
      localStorage.removeItem("token");
      window.location.replace("login.html");
    }
  </script>

  <!-- LOGOUT MODAL -->
  <div id="logoutModal" class="logout-modal">
    <div class="logout-box">
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to logout?</p>
      <div class="logout-actions">
        <button onclick="confirmLogout()" class="yes-btn">Yes</button>
        <button onclick="closeLogoutModal()" class="no-btn">No</button>
      </div>
    </div>
  </div>

</body>
</html>

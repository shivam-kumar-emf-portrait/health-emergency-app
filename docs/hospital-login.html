<!DOCTYPE html>
<html>
<head>
  <title>Hospital Login | Health Assist</title>
  <link rel="stylesheet" href="css/hospital.css">
</head>
<body class="hospital-body">

  <div class="login-container">
    <h1 class="brand-title">Health Assist</h1>
    <h2 class="subtitle">Hospital Dashboard</h2>

    <form id="hospitalLoginForm">
      <input type="email" id="email" placeholder="Hospital Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="errorMessage" class="error-text"></p>
  </div>

  <script src="js/hospital.js"></script>
</body>
</html>
